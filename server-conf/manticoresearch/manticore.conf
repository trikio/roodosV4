source house_pe
{
	type			= mysql
	sql_host		= DB_HOST
	sql_user		= DB_USERNAME
	sql_pass		= DB_PASSWORD
	sql_db			= DB_DATABASE
	sql_port		= 3306
	
	sql_query = SELECT house.id, house.url, house.slug, house.title, house.image, house.id_house_operation, IF(house_operation_lang.name IS NULL,house_operation.name,house_operation_lang.name) as house_operation_name, house.id_house_type, IF(house_type_lang.name IS NULL,house_type.name,house_type_lang.name) as house_type_name, house.id_state, state.FULLNAME as state_name, house.id_city, city.FULLNAME as city_name, house.details, house.price, house.rooms, house.bath, house.size FROM houses as house LEFT JOIN house_operation as house_operation ON house.id_house_operation = house_operation.id_house_operation LEFT JOIN house_operation_lang as house_operation_lang ON house.id_house_operation = house_operation_lang.id_house_operation AND house_operation_lang.id_country = 'pe' LEFT JOIN house_type as house_type ON house.id_house_type = house_type.id_house_type LEFT JOIN house_type_lang as house_type_lang ON house.id_house_type = house_type_lang.id_house_type AND house_type_lang.id_country = 'pe' LEFT JOIN states as state ON house.id_state = state.id LEFT JOIN cities as city ON house.id_city = city.id WHERE house.status = 1 AND house.id_country = 'pe';


	
	sql_field_string	= title
	sql_field_string	= details
	sql_field_string	= house_operation_name
	sql_field_string	= house_type_name
	sql_field_string	= city_name
	sql_field_string	= state_name

	sql_attr_string	= url
