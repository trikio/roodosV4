source job_cl
{
	type			= mysql
	sql_host		= DB_HOST
	sql_user		= DB_USERNAME
	sql_pass		= DB_PASSWORD
	sql_db			= DB_DATABASE
	sql_port		= 3306

	sql_query = SELECT job.id, job.url, job.slug, job.title, job.id_job_category, job_category.name as job_category_name, job.id_state, state.FULLNAME as state_name, job.id_city, city.FULLNAME as city_name, job.details FROM jobs as job LEFT JOIN job_category as job_category ON job.id_job_category = job_category.id_job_category LEFT JOIN states as state ON job.id_state = state.id LEFT JOIN cities as city ON job.id_city = city.id WHERE job.id_country = 'cl' AND job.status = 1;

	sql_field_string	= title
	sql_field_string	= details
	sql_field_string	= job_category_name
	sql_field_string	= city_name
	sql_field_string	= state_name

	sql_attr_string	= url
	sql_attr_string	= slug
	sql_attr_uint	= id_job_category
	sql_attr_uint	= id_state
	sql_attr_uint	= id_city
}

