source location
{
	type			= mysql
	sql_host		= DB_HOST
	sql_user		= DB_USERNAME
	sql_pass		= DB_PASSWORD
	sql_db			= DB_DATABASE
	sql_port		= 3306

	sql_query 			= SELECT city.id as id ,CONCAT(state.FULLNAME,' ',city.FULLNAME) as state_city, state.id as id_state, state.FULLNAME as state_name, city.FULLNAME as city_name, city.CC1 as country FROM cities as city LEFT JOIN states as state ON city.ADM1 = state.ADM_CODE AND city.CC1 = state.CC1;

	sql_field_string	= state_city

	sql_attr_string	= country
	sql_attr_string	= state_name
	sql_attr_string	= city_name
	sql_attr_uint	= id_state

}


