	sql_host		= DB_HOST
	sql_user		= DB_USERNAME
	sql_pass		= DB_PASSWORD
	sql_db			= DB_DATABASE
	sql_port		= 3306

	
	sql_query = SELECT car.id, car.url, car.slug, car.title, car.image, car.id_car_make, make.name as make_name, car.id_car_model, model.name as model_name, car.id_state, state.FULLNAME as state_name, car.id_city, city.FULLNAME as city_name, car.details, car.price, car.year as year_int, car.year as year_string, car.km, car.id_fuel, IF(fuel_lang.name IS NULL,fuel.name,fuel_lang.name) as fuel_name, car.id_transmission, trans.name as transmission_name, car.id_body, IF(body_lang.name IS NULL,body.name,body_lang.name) as body_name FROM cars as car LEFT JOIN car_make as make ON car.id_car_make = make.id_car_make LEFT JOIN car_model as model ON car.id_car_model = model.id_car_model LEFT JOIN states as state ON car.id_state = state.id LEFT JOIN cities as city ON car.id_city = city.id LEFT JOIN car_fuel as fuel ON car.id_fuel = fuel.id LEFT JOIN car_fuel_lang as fuel_lang ON car.id_fuel = fuel_lang.id_car_fuel AND fuel_lang.id_country = 'co' LEFT JOIN car_transmission as trans ON car.id_transmission = trans.id LEFT JOIN car_body as body ON car.id_body = body.id LEFT JOIN car_body_lang as body_lang ON car.id_body = body_lang.id_car_body AND body_lang.id_country = 'co' WHERE car.status = 1 AND car.id_country = 'co';

	sql_field_string	= title
