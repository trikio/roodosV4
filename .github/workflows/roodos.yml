on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:

  run_pull:
    name: run pull
    runs-on: ubuntu-latest

    steps:

      - name: executing remote ssh commands using ssh key
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |

            cd /app/
            sudo mkdir release_temp
            cd release_temp
            sudo git clone git@github.com:trikio/roodosV4.git
            cd roodosV4


            sudo cp ./server-conf/nginx/nginx.conf /etc/nginx/nginx.conf
            sudo cp ./server-conf/nginx/default_swoole /etc/nginx/sites-available/default
            sudo cp ./server-conf/manticoresearch/stop_words_es.txt /etc/manticoresearch/stop_words_es.txt


            DB_PASS_ESCAPED=$(printf '%s' '${{ secrets.DB_PASS }}' | sed 's/[\\/&]/\\&/g')
            sudo sed -i "s|DB_PASSWORD|$DB_PASS_ESCAPED|g" ./server-conf/manticoresearch/manticore.conf


            APP_KEY_ESCAPED=$(printf '%s' "${{ secrets.APP_ROODOS_KEY }}" | sed 's/[\\/&]/\\&/g')
            sudo sed -i "s/APP_ROODOS_KEY/$APP_KEY_ESCAPED/g" ./server-conf/_env_production


            sudo cp ./server-conf/_env_production /app/.env
            sudo cp ./server-conf/manticoresearch/manticore.conf /etc/manticoresearch/manticore.conf

            sudo crontab /app/server-conf/cron/crontab
            sudo /etc/init.d/cron start 

            sudo rm -R /app/release_temp
  
            if command -v indexer >/dev/null 2>&1; then
              sudo indexer --all --rotate || true
            fi

            cd /app/
            
            sudo git fetch origin main
            sudo git reset --hard origin/main
            sudo git clean -fd

            if [ -f composer.json ]; then
              sudo composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction
            fi

            sudo npm ci
            sudo npm run build

            sudo php8.4 artisan octane:stop --server=swoole || true
            sudo nohup php8.4 artisan octane:start --server=swoole --host=0.0.0.0 --port=8000 >/var/log/octane.log 2>&1 &
            
            sudo service nginx restart

            exit
