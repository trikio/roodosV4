on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:

  run_pull:
    name: run pull
    runs-on: ubuntu-latest

    steps:

      - name: executing remote ssh commands using ssh key
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |

            cd /app/
            sudo mkdir release_temp
            cd release_temp
            sudo git clone git@github.com:trikio/roodos.git
            cd roodos

            sudo cp ./server-conf/php/fpm/php.ini /etc/php/8.3/fpm/php.ini
            sudo cp ./server-conf/php/cli/php.ini /etc/php/8.3/cli/php.ini
            sudo cp ./server-conf/nginx/nginx.conf /etc/nginx/nginx.conf
            sudo cp ./server-conf/nginx/default /etc/nginx/sites-available/default
            sudo cp ./server-conf/manticoresearch/manticore /etc/default/manticore
            sudo cp ./server-conf/manticoresearch/stop_words_es.txt /etc/manticoresearch/stop_words_es.txt


            sudo sed -i 's/DB_HOST_VAR/${{ secrets.DB_HOST }}/g' ./server-conf/_env_production
            sudo sed -i 's/DB_NAME_VAR/${{ secrets.DB_NAME }}/g' ./server-conf/_env_production
            sudo sed -i 's/DB_PASS_VAR/${{ secrets.DB_PASS }}/g' ./server-conf/_env_production
            sudo sed -i 's/DB_USER_VAR/${{ secrets.DB_USER }}/g' ./server-conf/_env_production

            sudo sed -i 's/DB_HOST/${{ secrets.DB_HOST }}/g' ./server-conf/manticoresearch/manticore.conf
            sudo sed -i 's/DB_DATABASE/${{ secrets.DB_NAME }}/g' ./server-conf/manticoresearch/manticore.conf
            sudo sed -i 's/DB_PASSWORD/${{ secrets.DB_PASS }}/g' ./server-conf/manticoresearch/manticore.conf
            sudo sed -i 's/DB_USERNAME/${{ secrets.DB_USER }}/g' ./server-conf/manticoresearch/manticore.conf

            sudo cp ./server-conf/_env_production /app/.env
            sudo cp ./server-conf/manticoresearch/manticore.conf /etc/manticoresearch/manticore.conf

            sudo crontab /app/server-conf/cron/crontab
            sudo /etc/init.d/cron start 

            sudo rm -R /app/release_temp
  
            sudo indexer --all --rotate

            cd /app/
            
            sudo git fetch origin master
            sudo git reset --hard origin/master
            sudo git clean -fd

            sudo service php8.3-fpm restart
            sudo service nginx restart

            exit



